<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>매물 등록 | 화성광림</title>
    <script>
      if (localStorage.getItem("hw_admin_logged_in") !== "true") {
        location.replace("./admin-login.html");
      }
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-requires-admin="true">
    <header class="site-header solid-header">
      <a class="brand" href="./index.html" aria-label="화성광림 홈">
        <span class="brand-mark">HK</span>
        <span>
          <strong>화성광림</strong>
          <small>KWANGLIM DEALER</small>
        </span>
      </a>
      <button class="menu-button" type="button" aria-label="메뉴 열기" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="main-nav" aria-label="주요 메뉴">
        <a href="./index.html#products">제품</a>
        <a href="./inventory.html">중고 매물</a>
        <a href="./index.html#service">상담/정비</a>
        <a href="./index.html#contact">오시는 길</a>
        <a class="admin-only" href="./admin-new.html" aria-current="page">매물등록</a>
        <a class="auth-link" href="./admin-login.html">관리자 로그인</a>
      </nav>
      <a class="header-call" href="tel:010-0000-0000">상담문의 010-0000-0000</a>
    </header>

    <main class="sub-page">
      <section class="page-hero compact-hero">
        <div class="section-shell">
          <p class="section-kicker">ADMIN</p>
          <h1>매물 등록</h1>
          <p>차량 정보와 이미지 URL을 입력하면 브라우저 저장소에 데모 매물이 추가됩니다.</p>
        </div>
      </section>

      <section class="section-shell admin-layout">
        <form class="admin-form" data-admin-form>
          <label>
            <span>차량명</span>
            <input name="title" type="text" placeholder="예: 5톤 광림 집게차 1204EX" required />
          </label>
          <label>
            <span>차종</span>
            <select name="type" required>
              <option value="집게차">집게차</option>
              <option value="카고크레인">카고크레인</option>
              <option value="특장차">특장차</option>
            </select>
          </label>
          <label>
            <span>톤수</span>
            <input name="ton" type="text" placeholder="예: 5톤" required />
          </label>
          <label>
            <span>연식</span>
            <input name="year" type="text" placeholder="예: 2019년" required />
          </label>
          <label>
            <span>주행거리</span>
            <input name="mileage" type="text" placeholder="예: 120,000km" required />
          </label>
          <label>
            <span>가격</span>
            <input name="price" type="text" placeholder="예: 상담문의" required />
          </label>
          <label class="wide">
            <span>대표 이미지 URL</span>
            <input name="image" type="url" placeholder="https://..." required />
          </label>
          <label class="wide">
            <span>추가 이미지 URL</span>
            <textarea name="images" rows="4" placeholder="이미지 URL을 줄바꿈으로 여러 개 입력"></textarea>
          </label>
          <label class="wide">
            <span>상세 설명</span>
            <textarea name="description" rows="5" placeholder="차량 상태, 장비 사양, 정비 이력 등을 입력" required></textarea>
          </label>
          <div class="form-actions wide">
            <button class="primary-button" type="submit">등록하기</button>
            <a class="secondary-button light" href="./inventory.html">목록으로</a>
          </div>
        </form>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>

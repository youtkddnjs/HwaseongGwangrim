<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>보유 매물 | 화성광림</title>
    <meta name="description" content="화성광림 신차 상담 및 보유 중고 집게차, 특장차 매물 목록입니다." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header solid-header">
      <a class="brand" href="./index.html" aria-label="화성광림 홈">
        <span class="brand-mark">HK</span>
        <span>
          <strong>화성광림</strong>
          <small>KWANGLIM DEALER</small>
        </span>
      </a>
      <button class="menu-button" type="button" aria-label="메뉴 열기" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="main-nav" aria-label="주요 메뉴">
        <a href="./index.html#products">제품</a>
        <a href="./inventory.html" aria-current="page">중고 매물</a>
        <a href="./index.html#service">상담/정비</a>
        <a href="./index.html#contact">오시는 길</a>
        <a class="admin-only" href="./admin-new.html">매물등록</a>
        <a class="auth-link" href="./admin-login.html">관리자 로그인</a>
      </nav>
      <a class="header-call" href="tel:010-0000-0000">상담문의 010-0000-0000</a>
    </header>

    <main class="sub-page">
      <section class="page-hero">
        <div class="section-shell">
          <p class="section-kicker">USED TRUCKS</p>
          <h1>보유 매물</h1>
          <p>신차 상담 가능 차종과 현재 확인 가능한 중고 집게차, 카고크레인, 특장차 매물을 안내합니다.</p>
        </div>
      </section>

      <section class="section-shell listing-toolbar" aria-label="매물 필터">
        <form class="filter-form">
          <label>
            <span>차종</span>
            <select name="type" data-filter="type">
              <option value="">전체</option>
              <option value="집게차">집게차</option>
              <option value="카고크레인">카고크레인</option>
              <option value="특장차">특장차</option>
            </select>
          </label>
          <label>
            <span>톤수</span>
            <select name="ton" data-filter="ton">
              <option value="">전체</option>
              <option value="2.5톤">2.5톤</option>
              <option value="3.5톤">3.5톤</option>
              <option value="5톤">5톤</option>
              <option value="8톤 이상">8톤 이상</option>
            </select>
          </label>
        </form>
        <a href="./admin-new.html" class="primary-button compact admin-only">매물등록</a>
      </section>

      <section class="section-shell inventory-grid inventory-page-grid" data-listings="all"></section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>화성광림</strong>
        <p>광림 집게차 공식 대리점 · 중고 특장차 상담 판매</p>
      </div>
      <address>상담전화 010-0000-0000<br />경기도 화성시 사업장 주소 입력 예정</address>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>

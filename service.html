<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상담/정비 문의 | 화성광림</title>
    <meta name="description" content="화성광림 집게차, 카고크레인, 중고 특장차 상담 및 정비 문의 페이지입니다." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header solid-header">
      <a class="brand" href="./index.html" aria-label="화성광림 홈">
        <span class="brand-mark">HK</span>
        <span>
          <strong>화성광림</strong>
          <small>KWANGLIM DEALER</small>
        </span>
      </a>
      <button class="menu-button" type="button" aria-label="메뉴 열기" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="main-nav" aria-label="주요 메뉴"></nav>
      <a class="header-call" href="tel:031-354-4482">상담문의 031-354-4482</a>
    </header>

    <main class="sub-page">
      <section class="page-hero service-hero">
        <div class="section-shell">
          <p class="section-kicker">SERVICE REQUEST</p>
          <h1>문의 또는 상담예약</h1>
          <p>광림 신차 구매, 보유 중고 매물 확인, 정비 상담이 필요하시면 내용을 남겨주세요.</p>
        </div>
      </section>

      <section class="section-shell request-layout">
        <form class="request-form" data-request-form>
          <div class="request-type" role="group" aria-label="문의 유형">
            <label><input type="radio" name="category" value="구매 상담" checked /> 신차/구매 상담</label>
            <label><input type="radio" name="category" value="중고 매물 문의" /> 중고 매물 문의</label>
            <label><input type="radio" name="category" value="정비 상담" /> 정비 상담</label>
          </div>

          <label>
            <span>성함</span>
            <input name="name" type="text" placeholder="홍길동" required />
          </label>
          <label>
            <span>연락처</span>
            <input name="phone" type="tel" placeholder="010-0000-0000" required />
          </label>
          <label>
            <span>희망 상담일</span>
            <input name="date" type="date" />
          </label>
          <label>
            <span>관심 차종</span>
            <select name="vehicle">
              <option>집게차</option>
              <option>카고크레인</option>
              <option>특장차</option>
              <option>신차 상담</option>
              <option>중고 매물</option>
            </select>
          </label>
          <label class="wide">
            <span>문의 내용</span>
            <textarea
              name="message"
              rows="6"
              placeholder="필요한 차량 톤수, 작업 현장, 정비 문의 내용을 적어주세요."
              required
            ></textarea>
          </label>
          <div class="form-actions wide">
            <button class="primary-button" type="submit">문의 남기기</button>
            <a class="secondary-button light" href="tel:010-5250-5364">바로 전화하기</a>
          </div>
          <p class="form-note wide" data-request-result aria-live="polite"></p>
        </form>

        <aside class="request-aside">
          <p class="section-kicker">DIRECT CONTACT</p>
          <h2>빠른 상담</h2>
          <p>급한 상담은 전화로 문의하시면 더 빠르게 안내받을 수 있습니다.</p>
          <dl>
            <div><dt>TEL</dt><dd><a href="tel:031-354-4482">031-354-4482</a></dd></div>
            <div><dt>PHONE</dt><dd><a href="tel:010-5250-5364">010-5250-5364</a></dd></div>
            <div><dt>주소</dt><dd>경기 화성시 팔탄면 제암고주로 134-6</dd></div>
          </dl>
        </aside>
      </section>
    </main>

    <footer class="site-footer"></footer>
    <script src="./script.js"></script>
  </body>
</html>
